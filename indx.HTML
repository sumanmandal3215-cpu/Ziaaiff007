<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zigzag Trade 007</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#0a0f1f; }
.neon-green { color:#00ffcc; }
.neon-red { color:#ff4d4d; }
.glow { box-shadow:0 0 10px #00ffcc; }
.hidden-btn {
  position:fixed;
  bottom:3px;
  right:3px;
  width:12px;
  height:12px;
  opacity:0.1;
}
</style>
</head>

<body class="text-white">

<div id="app"></div>

<div class="hidden-btn bg-white" onclick="openAdmin()"></div>

<script>
/* =========================
   GLOBAL STATE
========================= */
let user = null;
let users = JSON.parse(localStorage.getItem("users")||"{}");
let prices = {};
let trades = [];
let withdrawals = [];
let usdtAddress = "TXYZ123456789";
let qr = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=USDT";

/* =========================
   MARKETS (100+)
========================= */
const ASSETS = [
 "EURUSD","GBPUSD","USDJPY","BTCUSD","ETHUSD",
 "XAUUSD","XAGUSD","AAPL","TSLA","GOOGL"
];
for(let i=0;i<100;i++) ASSETS.push("ASSET"+i);

/* INIT PRICES */
ASSETS.forEach(a=>prices[a]=100+Math.random()*50);

/* PRICE UPDATE */
setInterval(()=>{
  ASSETS.forEach(a=>{
    prices[a]+= (Math.random()-0.5)*0.5;
  });
  render();
},1000);

/* =========================
   AUTH
========================= */
function login(){
  const email = prompt("Email");
  const pass = prompt("Password");

  if(!users[email]){
    users[email] = {
      email,
      pass,
      balance:1000,
      id: Date.now(),
      history:[]
    };
  }

  user = users[email];
  localStorage.setItem("users",JSON.stringify(users));
  render();
}

/* =========================
   TRADE
========================= */
function placeTrade(type){
  const asset = document.getElementById("asset").value;
  const amount = +document.getElementById("amount").value;
  const time = +document.getElementById("time").value;

  if(user.balance < amount) return alert("Low balance");

  user.balance -= amount;

  const trade = {
    asset,
    amount,
    type,
    entry: prices[asset],
    expiry: Date.now()+time*1000
  };

  trades.push(trade);
}

/* SETTLE */
setInterval(()=>{
  const now = Date.now();

  trades = trades.filter(t=>{
    if(now>=t.expiry){
      const price = prices[t.asset];
      let win = t.type==="CALL" ? price>t.entry : price<t.entry;

      if(win){
        let profit = t.amount*0.83;
        let fee = profit*0.05;
        user.balance += t.amount + (profit-fee);
      }

      user.history.push(t);
      return false;
    }
    return true;
  });

  render();
},1000);

/* =========================
   WITHDRAW
========================= */
function withdraw(){
  const addr = prompt("USDT Address");
  const amt = +prompt("Amount");

  withdrawals.push({user:user.email,addr,amt});
  alert("Request submitted");
}

/* =========================
   UI RENDER
========================= */
function render(){
  if(!user){
    document.getElementById("app").innerHTML=`
      <div class="p-6 text-center">
        <h1 class="text-2xl neon-green">Zigzag Trade 007</h1>
        <button onclick="login()" class="mt-5 bg-green-500 p-3 rounded">Login</button>
      </div>`;
    return;
  }

  let marketHTML="";
  ASSETS.slice(0,50).forEach(a=>{
    marketHTML+=`
    <div class="flex justify-between border-b p-1">
      <span>${a}</span>
      <span>${prices[a].toFixed(4)}</span>
    </div>`;
  });

  document.getElementById("app").innerHTML=`
  <div class="p-2">

    <div class="text-center neon-green text-xl">
      Balance: ${user.balance.toFixed(2)}
    </div>

    <div class="h-40 overflow-y-scroll mt-2 bg-black">
      ${marketHTML}
    </div>

    <div class="mt-2">
      <select id="asset" class="text-black w-full p-1">
        ${ASSETS.map(a=>`<option>${a}</option>`).join("")}
      </select>

      <input id="amount" placeholder="Amount" class="text-black w-full p-1 mt-1"/>

      <select id="time" class="text-black w-full p-1 mt-1">
        <option value="60">1m</option>
        <option value="120">2m</option>
        <option value="300">5m</option>
      </select>

      <div class="flex mt-2">
        <button onclick="placeTrade('CALL')" class="bg-green-500 w-1/2 p-2">CALL</button>
        <button onclick="placeTrade('PUT')" class="bg-red-500 w-1/2 p-2">PUT</button>
      </div>

      <button onclick="withdraw()" class="bg-yellow-500 w-full mt-2 p-2">Withdraw</button>
    </div>

    <div class="mt-3 bg-black p-2">
      <h3>Deposit</h3>
      <img src="${qr}" width="100"/>
      <div>${usdtAddress}</div>
      <button onclick="navigator.clipboard.writeText(usdtAddress)">Copy</button>
    </div>

  </div>`;
}

/* =========================
   ADMIN PANEL (SAFE)
========================= */
function openAdmin(){
  const pass = prompt("Enter Admin Password");

  if(pass==="Win@0987"){
    document.body.innerHTML=`
      <div class="p-4">
        <h2 class="text-xl">Admin Panel</h2>

        <div>Total Users: ${Object.keys(users).length}</div>
        <div>Active Trades: ${trades.length}</div>

        <h3 class="mt-3">USDT Settings</h3>
        <input id="addr" placeholder="Wallet" class="text-black"/>
        <input id="qr" placeholder="QR URL" class="text-black"/>

        <button onclick="saveSettings()">Save</button>

        <h3 class="mt-3">Withdrawals</h3>
        ${withdrawals.map(w=>`<div>${w.user} - ${w.amt}</div>`).join("")}

        <button onclick="location.reload()">Back</button>
      </div>`;
  }
}

function saveSettings(){
  usdtAddress = document.getElementById("addr").value;
  qr = document.getElementById("qr").value;
  alert("Saved");
}

/* INIT */
render();

</script>

</body>
</html>
